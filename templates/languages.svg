<svg id="gh-dark-mode-only" width="400" height="210" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  fill: #1a1b26;
  stroke: #292e42;
  stroke-width: 1px;
  rx: 10px;
  ry: 10px;
}

foreignObject {
  width: calc(100% - 10px - 32px);
  height: calc(100% - 10px - 24px);
}

h2 {
  margin-top: 0;
  margin-bottom: 0.75em;
  line-height: 24px;
  font-size: 16px;
  font-weight: 700;
  color: #7aa2f7;
}

ul {
  list-style: none;
  padding-left: 0;
  margin-top: 0;
  margin-bottom: 0;
}

li {
  display: inline-flex;
  font-size: 13px;
  margin-right: 2ch;
  align-items: center;
  flex-wrap: nowrap;
  transform: translateX(-500%);
  animation: slideIn 0.8s ease-out forwards;
}

@keyframes slideIn {
  to {
    transform: translateX(0);
  }
}

div.ellipsis {
  height: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}

.octicon {
  margin-right: 0.5ch;
  vertical-align: middle;
}

.progress {
  display: flex;
  height: 8px;
  overflow: hidden;
  background-color: #292e42;
  border-radius: 6px;
  margin-bottom: 1.5em;
}

.progress-item {
  outline: 1.5px solid #1a1b26;
  border-collapse: collapse;
}

.lang {
  font-weight: 600;
  margin-right: 4px;
  color: #c0caf5;
}

.percent {
  color: #9ece6a;
  font-weight: bold;
}
</style>
<g>
<rect x="5" y="5" id="background" />
<g>
<foreignObject x="21" y="21" width="358" height="176">
<div xmlns="http://www.w3.org/1999/xhtml" class="ellipsis">

<h2>Top Languages (By Size)</h2>

<div>
<span class="progress">
{{ progress }}
</span>
</div>

<ul>

{{ lang_list }}

</ul>

</div>
</foreignObject>
</g>
</g>
</svg>
